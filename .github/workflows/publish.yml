name: Publish to NuGet

on:
  push:
    tags:
      - 'v1.0'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write # REQUIRED: Allows GitHub to issue an OIDC token
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0'

    # 1. Build and pack the project
    - name: Pack Package
      run: dotnet pack --configuration Release --output ./artifacts

    # 2. Authenticate using Trusted Publishing (OIDC)
    - name: NuGet Login
      uses: NuGet/login@v1
      with:
        # Provide your nuget.org profile username (not email)
        # You can hardcode your username string here safely
        user: ibadb 

    # 3. Push to NuGet without an explicit API key string
    - name: Push to NuGet
      run: dotnet nuget push "./artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json
